<!DOCTYPE html>
<html>
<head>
    <title>Detail Artikel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8f9fa);
    }
    .card { border-radius: 15px; }
    .shadow-custom { box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    </style>
</head>

<body>
<div class="container mt-5">

<div class="card shadow-custom border-0">
<div class="card-body">

<h2 class="fw-bold mb-3" style="color:#4f46e5;">
    {{ artikel.judul }}
</h2>

<span class="badge mb-3" style="background:#6366f1;">
    {{ artikel.kategori.name }}
</span>

<p style="line-height:1.9;">
    {{ artikel.isi }}
</p>

<hr>

<a href="/" class="btn btn-outline-primary shadow-sm">⬅ Kembali</a>

</div>
</div>

</div>
</body>
</html>
