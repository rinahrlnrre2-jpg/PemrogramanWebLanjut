<!DOCTYPE html>
<html>
<head>
    <title>Tambah Artikel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8f9fa);
    }
    .card { border-radius: 15px; }
    .shadow-custom { box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    </style>
</head>

<body>
<div class="container mt-5" style="max-width:600px;">

<div class="card shadow-custom border-0">
<div class="card-body">

<h3 class="mb-4 text-center fw-bold" style="color:#4f46e5;">
    ✍️ Tambah Artikel
</h3>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label>Judul</label>
        <input type="text" name="judul" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Isi Artikel</label>
        <textarea name="isi" class="form-control" rows="5" required></textarea>
    </div>

    <div class="mb-3">
        <label>Kategori</label>
        <select name="kategori" class="form-control">
            {% for k in kategori %}
            <option value="{{ k.id }}">{{ k.name }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit" class="btn btn-success w-100 shadow-custom">
        Simpan Artikel
    </button>
</form>

<div class="text-center mt-3">
    <a href="/">⬅ Kembali</a>
</div>

</div>
</div>

</div>
</body>
</html>
